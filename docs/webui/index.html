        * { margin: 0; padding: 0; outline: none; border: none; user-select: none; }
        html, body { user-select: none; overflow: hidden; touch-action: pan-x; -webkit-tap-highlight-color: transparent; }
        body { background: #0D1117; color: silver; font-family: DroidSans; font-size: 14px; cursor: default; }
        a, a:visited { color: #59667a; text-decoration: none; }
        a:hover { color: slateblue; }
        input[type=number] { caret-color: aqua; background: #465266; color: silver; font-size: 14px; width: 95%; padding: 3px; border-radius: 3px; text-align: center; }
        input[type=text] { caret-color: aqua; text-indent: 3px; background: #465266; color: silver; width: 95%; font-size: 15px; padding: 3px; border-radius: 3px; }
        input[type=range] { accent-color: slateblue; width: 100%; height: 3px; vertical-align: middle; }
        input[type=range]::-webkit-slider-thumb { transform: scale(0.9); }
        input[type=range]::-webkit-slider-thumb:hover { cursor: pointer; }
        input[type=color] { width: 100%; height: 30px; border-radius: 0; background: none; outline: none; border: none; }
        input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border: solid 1px #00000000; }
        input[type=color]::-webkit-color-swatch { border: none; border-radius: 0; border: solid 1px #313b50; }
        input[type=checkbox] { accent-color: slateblue; vertical-align: middle; }
        input[type=checkbox] { filter: brightness(0.6); transform: scale(0.9); margin: 3px 0 3px 0; vertical-align: -2px; }
        input[type=checkbox]:checked { accent-color: slateblue; filter: none; }
        input[type=checkbox]:disabled { opacity: 0.5; }
        select { width: 100%; background: #323c4e; color: silver; font-size: 13px; padding: 2px; border-radius: 3px; }
        textarea { background: slategray; border: solid 1px #313b50; width: 100%; font-family: DroidSans; font-size: 17px; padding: 8px; margin: 3px; resize: none; }
        button { width: 100%; background: #3f4a5e; color: silver; height: 30px; font-size: 14px; border: solid 1px #313b50; }
        button:hover, button.tool_selector { background: slateblue; color: white; cursor: pointer; }
        button:disabled { background: #2e3542; color: #888; border-color: #424d61; pointer-events: none; }
        img { background-color: #161c25; cursor: grab; }
        label { font-size: 12px; }
        canvas { z-index: 5; position: absolute; }
        #canvas_image { z-index: 1; pointer-events: none; }
        #canvas_helper { z-index: 10; pointer-events: none; }
        #container { display: flex; position: fixed; height: 100%; width: 100%; }
        #container_left { z-index: 1000; background: #161c25BB; width: 140px; min-width: 0; max-width: 250px; padding: 0 3px 0 3px; align-items:baseline; display: flex; justify-content: center; overflow: hidden; overflow-y: scroll; }
        #container_left::-webkit-scrollbar { display: none; }
        #container_right { min-width: 30%; flex: 1; align-items: left; display: flex; flex-direction: column; justify-content: left; }
        #container_top { height: 82%; min-height: 0; align-items: center; display: flex; justify-content: center;
            background-color: #ffffff11;
            background-image: linear-gradient(45deg, #1f2429 25%, transparent 20%), linear-gradient(-45deg, #1f2429 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #1f2429 75%), linear-gradient(-45deg, transparent 75%, #1f2429 75%);
            background-size: 38px 38px; background-position: 0 0, 0 19px, 19px -19px, -19px 0;
            box-shadow: 0 0 20px 0 #00000060 inset; }
        #container_bottom { z-index: 1000; background: #161c25BB; height: 20%; min-height: 30px; flex: 1; align-items: center; justify-content: center; }
        .resizer[data-direction='horizontal'] { z-index: 1000; background: #343b4bBB; height: 100%; width: 8px; cursor: ew-resize; }
        .resizer[data-direction='horizontal']:hover { background: slategray; }
        .resizer[data-direction='vertical'] { z-index: 1000; background: #343b4bBB; color: #707b92; width: 100%; height: 8px; cursor: ns-resize; }
        .resizer[data-direction='vertical']:hover { background: slategray; }
        #comp_container { box-shadow: -2px -2px 8px #111; position: absolute; width: 512px; height: 512px; left: 50%; top: 45%; transform: translate(-50%,-50%); }
        .comp_img { position: absolute; width: 100%; height: 100%; overflow:hidden; }
        .comp_img img { display: block; border: none; }
        .comp_slider { position: absolute; cursor: ew-resize; z-index: 10; width: 6px; height: 512px; background: #3f4a5e; opacity: 0.7; border: none; border-top-right-radius: 5px; border-bottom-right-radius: 5px; }
        .comp_slider:hover { background: slateblue; opacity: 1; }
        .comp_slider2 { position: absolute; cursor: ew-resize; z-index: 10; width: 40px; height: 10px; background: #3f4a5e; opacity: 0.7; border: none; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; }
        .comp_slider2:hover { background: slateblue; opacity: 1; }
        #images { z-index: 1000; display: block; top: 0; right: 3px; width: 128px; height: fit-content; text-align: center; position: absolute; }
        #images button { width: 128px; height: 25px; box-shadow: inset 0 0 2px #0D1117; background: #1a212cCC; color: slategray; font-size: 13px; border: none; }
        #images button:hover { background: #11161bCC; color: #8070e7; }
        #images button.tool_selector { background: #8070e7; color: #171d24; }
        #images img { margin-bottom: -3px; }
        #images label { font-size: 10px; margin-left: 3px; }
        #images ul { list-style: none; }
        #images li.category { font-size: 10px; font-weight: bold; letter-spacing: 0.1em; padding: 5px; margin-top: 15px; background: #1a212cCC; color: slategray; text-transform: uppercase; text-align: left; border-top-left-radius: 5px; border-top-right-radius: 5px; }
        #outpaint { background: #283141cc; color: slategray; border-radius: 0; }

        #progressbar { z-index: 100; display: none; width: 100%; max-width: 100%; height: 1px; left: 0; bottom: -3px; animation: rainbow 5s ease-out infinite; background: linear-gradient(90deg, #ff0000, #ff9000, #d9ff00, #00ff00, #00ffff, #0086ff, #0000ff, #ff00ff, #ff0000); background-size: 1000% 100%; position: relative; pointer-events: none; }

        <div id="container_left">

                            <input type="number" id="height" class="nospin ignorekeys" value="512" onchange="workspace.updateWorkspaceSize()">
                        </div>

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        now = performance.now();
        elapsed = now - then;
        if (elapsed > FPS) {
            then = now - (elapsed % FPS);

            if (server.isConnect) {
                if (!chk_initImage.checked) {
                    btn_gen.innerHTML = "Text to Image";
                    strength.disabled = true;
                } else if (chk_initImage.checked && !chk_maskImage.checked) {
                    btn_gen.innerHTML = "Image to Image";
                    strength.disabled = false;
                } else if (chk_initImage.checked && chk_maskImage.checked) {
                    btn_gen.innerHTML = "Inpaint";
                    strength.disabled = false;
                }

                if (server.isWorking) {
                    btn_gen.innerHTML = "Processing...";
                    progressBar.style.display = "block";
                } else {
                    progressBar.style.display = "none";
                }
            }
        }
    }


    // -------------------------------------------------------
    // Websocket Client


    function Server() {
        this.isConnect = false;
        this.isWorking = false;
        let socket = null;
        let ping = null;
        let timeout = null;
        let counter = 1;

        this.init = function() {
            this.ws_start();
        }

        this.ws_start = function() {
            ping = new WebSocket(SOCKET);
            ping.onopen = () => {
                ping.send(JSON.stringify({
                    key: "RUN",
                    val: null
                }));
                server.isConnect = true;
                checkpoint.disabled = false;
                btn_gen.disabled = false;
                btn_gen.style.color = "silver";
                console.log("Connected to server");
            }

            ping.onmessage = (msg) => {
                let js = JSON.parse(msg.data);
                createCheckpoints(js["checkpoints"]);
                selectOptionByValue(checkpoint, js["checkpoint"]);
                js = null;
            }

            ping.onclose = () => {
                server.isConnect = false;
                checkpoint.disabled = true;
                btn_gen.disabled = true;
                btn_gen.style.color = "indianred";
                btn_gen.innerHTML = "Disconnected";
                console.clear();
                console.log("Disconnected from server, retrying...");
                if (timeout)
                    clearTimeout(timeout);
                timeout = setTimeout(server.ws_start, 5000);
            }
        }

        this.ws_connect = function(key, val, callback) {
            socket = new WebSocket(SOCKET);
            socket.onopen = () => {
                server.isWorking = true;
                socket.send(JSON.stringify({
                    key: key,
                    val: val
                }));
            }

            socket.onmessage = (msg) => {
                server.isWorking = false;
                callback(msg);
                socket.close();
                socket = null;
            }

            socket.onclose = () => {
                server.isWorking = false;
                socket = null;
            }

            socket.onerror = () => {
                server.isWorking = false;
                socket = null;
            }
        }

        this.generate = function() {
            if (this.isWorking) return;
            
            if (!chk_initImage.checked && !chk_maskImage.checked
                && checkpoint.options[checkpoint.selectedIndex].value.includes("inpainting")) {
                notifier("Use inpainting model for inpainting only");
                return;
            }

            if (seedRng.checked)
                seed.value = randomRangeInt(0, 4294967295);
            
            this.ws_connect("NEW", buildData(), (msg) => {
                if (msg.data == "") return;

                let data = JSON.parse(msg.data);
                pool.add({
                    metadata: data["metadata"],
                    base64: data["base64"]
                });

                img_out.src = data["base64"];
                switch (output_target.value) {
                    case "canvas":
                        img_canvas.src = data["base64"];
                        workspace.saveImageCanvas();
                        workspace.clearPaintCanvas(false);
                        break;
                    case "canvasinput":
                        img_canvas.src = data["base64"];
                        workspace.saveImageCanvas();
                        workspace.clearPaintCanvas(false);
                        img_init.src = data["base64"];
                        chk_initImage.checked = true;
                        break;
                    case "back":
                        img_background.src = data["base64"];
                        break;
                    case "backinput":
                        img_background.src = data["base64"];
                        img_init.src = data["base64"];
                        chk_initImage.checked = true;
                        break;
                }
                data = null;

                if (upscale.checked) {
                    width.value = width.value * 4;
                    height.value = height.value * 4;
                    workspace.updateWorkspaceSize();
                    workspace.zoomSet(0.3);
                }

                counter++;
                if (counter <= parseInt(batchRender.value)) {
                    setTimeout(() => {
                        server.generate();
                    }, 100);
                } else {
                    counter = 1;
                }
            });
        }

        this.loadModel = function(modelname) {
            if (this.isWorking) return;
            this.ws_connect("MOD", modelname, (msg) => {
                //
            });
        }

        this.terminate = function() {
            // TODO
        }

        function buildData() {
            let p = prompt.value;
            if (chk_styles.checked) {
                for (const i in styles.active)
                    p += ", " + styles.active[i].toLowerCase();
            }

            return JSON.stringify({
                scheduler: scheduler.options[scheduler.selectedIndex].value,
                prompt: p,
                negative: negative.value,
                width: parseInt(width.value),
                height: parseInt(height.value),
                seed: parseInt(seed.value),
                steps: parseInt(steps.value),
                cfg: parseFloat(cfg.value),
                strength: parseFloat(strength.value),
                lora: 0.0,
                image: (!chk_initImage.checked) ? "" : img_init.src,
                mask:  (!chk_maskImage.checked) ? "" : img_mask.src,
                facefix: facefix.checked,
                upscale: upscale.checked,
                savefile: savefile.checked,
                onefile: onefile.checked,
                outpath: outpath.value,
                filename: `img_${ seed.value }_${ steps.value }_${ cfg.value }`
            });
        }

        this.init();
    }

            outpath.value = data.metadata["outpath"];
            //filename.value = js["filename"];

            img_canvas.src = data.base64;
            workspace.updateWorkspaceSize();
        }

        this.readMetadata = function(file, singleFile) {
            const reader = new FileReader();
            reader.onload = () => {
                // extract metadata with a never-done-before hack, it works!
                if (reader.result.includes(`{"version": "MD`)) {
                    const match = reader.result.match(/\{"(.*?)\"}/)[0];
                    if (match.startsWith(`{"version": "MD`)) {
                        const metadata = JSON.parse(match);
                        const readerB64 = new FileReader();
                        readerB64.onload = () => {
                            pool.add({
                                metadata: metadata,
                                base64: readerB64.result
                            });
                            if (singleFile) {
                                pool.loadSettings({
                                    metadata: metadata,
                                    base64: readerB64.result
                                });
                            }
                        }
                        readerB64.readAsDataURL(file);
                    } else {
                        notifier("invalid mental diffusion png");
                    }
                } else {
                    notifier("invalid mental diffusion png");
                }
            }
            reader.readAsBinaryString(file);
        }

        this.init();
    }


    // -------------------------------------------------------
    // Workspace


    function Workspace() {
        this.zoomAmount = 1;

        this.init = function() {
            this.resize();
            this.saveImageCanvas();
        }

        this.saveImageCanvas = function() {
            setTimeout(() => {
                ctxi.drawImage(img_canvas, 0, 0, width.value, height.value);
            }, 10); // important
        }

        this.savePaintCanvas = function() {
            ctxm.clearRect(0, 0, width.value, height.value);
            ctxm.drawImage(canvas_paint, 0, 0, width.value, height.value);
        }

        this.updateWorkspaceSize = function() {
            if (width.value < 256) width.value = 256;
            if (height.value < 256) height.value = 256;

            // width and height have to be divisible by 8
            width.value = Math.round(width.value / 8) * 8;
            height.value = Math.round(height.value / 8) * 8;

            this.resize();
            comp_container.style.width = width.value + "px";
            comp_container.style.height = height.value + "px";
            comparison.updateCompSliderCompare(parseInt(width.value));
            comparison.updateCompSliderOpacity(width.value);
            canvas_image.style.opacity = 1;
            canvas_paint.style.opacity = 1;
            this.saveImageCanvas();
            this.resetCanvasEditor();
            this.clearPaintCanvas(false);
        }

        this.createOutpaint = async function(padding) {
            if (padding >= parseInt(width.value) || padding >= parseInt(height.value)) {
                notifier("padding is equal to image size");
                document.getElementById("outpaint").value = 0;
                return;
            }
            if (padding < 0) {
                notifier("padding value is negative");
                document.getElementById("outpaint").value = 0;
                return;
            }
            if (!await showConfirm("Create and replace images?")) {
                document.getElementById("outpaint").value = 0;
                return;
            }
            
            const w = parseInt(width.value) - padding;
            const h = parseInt(height.value) - padding;

            img_init.src = createTempCanvas((c) => {
                c.fillStyle = "black";
                c.fillRect(0, 0, width.value, height.value);
                c.drawImage(img_canvas, padding/2, padding/2, w, h);
            });
            
            img_mask.src = createTempCanvas((c) => {
                c.fillStyle = "white";
                c.fillRect(0, 0, width.value, height.value);
                c.fillStyle = "black";
                c.fillRect(padding/2, padding/2, w, h);
            });

            chk_initImage.checked = true;
            chk_maskImage.checked = true;
            chk_mask.checked = false;
            strength.value = 1;
            strength.previousElementSibling.innerHTML = 1;
        }

        this.swapAB = function() {
            if (img_background.src == IMG_NULL) {
                notifier("empty background image");
                return;
            }
            img_canvas.src = img_background.src;
            img_background.src = canvas_image.toDataURL("image/png");
            this.saveImageCanvas();
            this.resetCanvasEditor();
        }

        this.flipCanvas = function() {
            ctxi.translate(width.value, 0);
            ctxi.scale(-1, 1);
            ctxi.drawImage(canvas_image, 0, 0);
            this.saveImageCanvas();
        }

        this.filterCanvas = function() {
            ctxi.filter =  `hue-rotate(${ document.getElementById("hue").value }deg)`;
            ctxi.filter += `saturate(${ document.getElementById("saturation").value })`;
            ctxi.filter += `brightness(${ document.getElementById("brightness").value })`;
            ctxi.filter += `contrast(${ document.getElementById("contrast").value })`;
            ctxi.filter += `sepia(${ document.getElementById("sepia").value })`;
            ctxi.filter += `invert(${ document.getElementById("invert").value })`;
            this.saveImageCanvas();
        }

        this.bakeWorkspace = function() {
            return createTempCanvas((c) => {
                c.drawImage(canvas_image, 0, 0);
                c.drawImage(canvas_paint, 0, 0);
            });
        }

        this.bakeCanvas = function(elem) {
            img_canvas.src = workspace.bakeWorkspace();
            this.saveImageCanvas();
            this.resetCanvasEditor();
            this.clearPaintCanvas(false);
            elem.innerHTML = 'Baked';
            setTimeout(() => {
                elem.innerHTML = 'Bake';
            }, 1000);
        }

        this.zoom = function(deltaY) {
            this.zoomAmount += (deltaY > 0) ? -0.1 : 0.1;
            if (this.zoomAmount < 0.1) this.zoomAmount = 0.1;
            comp_container.style.transform = `translate(-50%,-50%) scale(${ this.zoomAmount })`;
            document.getElementById("zoomlevel").innerHTML = this.zoomAmount.toFixed(1);
        }

        this.zoomSet = function(zoomAmount) {
            this.zoomAmount = zoomAmount;
            if (this.zoomAmount < 0.1) this.zoomAmount = 0.1;
            comp_container.style.transform = `translate(-50%,-50%) scale(${ this.zoomAmount })`;
            document.getElementById("zoomlevel").innerHTML = this.zoomAmount.toFixed(1);
        }

        this.zoomReset = function() {
            comp_container.style.top = "45%";
            comp_container.style.left = "50%";
            comp_container.style.transform = 'translate(-50%,-50%) scale(1)';
            this.zoomAmount = 1;
            document.getElementById("zoomlevel").innerHTML = this.zoomAmount.toFixed(1);
        }

        this.resize = function() {
            canvas_paint.width = width.value;
            canvas_paint.height = height.value;
            canvas_image.width = width.value;
            canvas_image.height = height.value;
            canvas_helper.width = width.value;
            canvas_helper.height = height.value;
            canvas_mem.width = width.value;
            canvas_mem.height = height.value;
            img_background.width = width.value;
            img_background.height = height.value;
        }

        this.resetCanvasEditor = function() {
            ctxi.filter = "none";
            ctxi.resetTransform(); // reset flip
            document.getElementById("hue").value = 0;
            document.getElementById("saturation").value = 1;
            document.getElementById("brightness").value = 1;
            document.getElementById("contrast").value = 1;
            document.getElementById("sepia").value = 0;
            document.getElementById("invert").value = 0;
            document.getElementById("hue").previousElementSibling.innerHTML = 0;
            document.getElementById("saturation").previousElementSibling.innerHTML = 1;
            document.getElementById("brightness").previousElementSibling.innerHTML = 1;
            document.getElementById("contrast").previousElementSibling.innerHTML = 1;
            document.getElementById("sepia").previousElementSibling.innerHTML = 0;
            document.getElementById("invert").previousElementSibling.innerHTML = 0;
        }

        this.clearPaintCanvas = async function(isAlert = true) {
            if (isAlert)
                if (!await showConfirm("This operation is not undoable, continue?")) return;
            ctx.clearRect(0,0, width.value, height.value);
            ctxm.clearRect(0,0, width.value, height.value);
            memory.clear();
        }
        
        this.init();
    }


    // -------------------------------------------------------
    // Helper
    

    function Helper() {
        this.color = '#00ffff';

        this.line = function(p1, p2, size) {
            this.clear();
            ctxh.beginPath();
            ctxh.moveTo(p1.x, p1.y);
            ctxh.lineTo(p2.x, p2.y);
            ctxh.strokeStyle = this.color;
            ctxh.lineWidth = 1;
            ctxh.stroke();
            ctxh.beginPath();
            ctxh.arc(p1.x, p1.y, size, 0, PI2);
            ctxh.arc(p2.x, p2.y, size, 0, PI2);
            ctxh.fillStyle = this.color + "EE";
            ctxh.fill();
        }

        this.circleStroke = function(x, y, r) {
            this.clear();
            ctxh.lineWidth = 1;
            ctxh.strokeStyle = this.color + 'EE';
            ctxh.beginPath();
            ctxh.arc(x, y, r, 0, PI2, false);
            ctxh.stroke();
            if (brushBlur.value > 0) {
                ctxh.beginPath();
                ctxh.arc(x, y, brushBlur.value*2, 0, PI2, false);
                ctxh.stroke();
            }
        }

        this.clear = function() {
            ctxh.clearRect(0, 0, width.value, height.value);
        }
    }


    // -------------------------------------------------------
    // Tools


    function Tool() {
        this.name = 'drag';
        const lastOffset = { x: 0, y: 0 };
        let startPoint = { x: 0, y: 0 };
        let endPoint = { x: 0, y: 0 };
        let points = [];

        this.init = function() {
            this.toolSelector(this.name);
        }

        this.drag = function() {
            //
        }

        this.pan = function() {
            lastOffset.x = comp_container.offsetLeft - (mouse.lastX - mouse.x);
            lastOffset.y = comp_container.offsetTop - (mouse.lastY - mouse.y);
            comp_container.style.left = lastOffset.x + "px";
            comp_container.style.top = lastOffset.y + "px";
        }

        this.brush = function() {
            ctx.clearRect(0, 0, width.value, height.value);
            ctx.drawImage(canvas_mem, 0, 0, width.value, height.value);
            if (!chk_mask.checked) ctx.globalAlpha = brushOpacity.value;
            ctx.filter = `blur(${ brushBlur.value }px)`;
            drawPoints(ctx, points, brushSize.value);
            ctx.filter = "none";
            ctx.globalAlpha = 1;
        }

        this.line = function() {
            points = plotLine(10, startPoint.x, startPoint.y, endPoint.x, endPoint.y);
            if (points.length > 5 && points.length < 300) { // limit length for performance
                ctx.clearRect(0, 0, width.value, height.value);
                ctx.drawImage(canvas_mem, 0, 0, width.value, height.value);
                if (!chk_mask.checked) ctx.globalAlpha = brushOpacity.value;
                ctx.filter = `blur(${ brushBlur.value }px)`;
                drawPoints(ctx, points, brushSize.value);
                ctx.filter = "none";
                ctx.globalAlpha = 1;
            }
        }

        this.eraser = function() {
            ctx.clearRect(0, 0, width.value, height.value);
            ctx.drawImage(canvas_mem, 0, 0, width.value, height.value);
            ctx.globalCompositeOperation = 'destination-out';
            if (!chk_mask.checked) ctx.globalAlpha = brushOpacity.value;
            ctx.filter = `blur(${ brushBlur.value }px)`;
            drawPoints(ctx, points, brushSize.value);
            ctx.filter = "none";
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
        }

        this.onToolDown = function() {
            if (comparison.isCompareDown || comparison.isOpacityDown) return;
            if (mouse.btn == 3) comp_container.style.border = dragStyle;
            comp_container.style.pointerEvents = "none";

            switch (this.name) {
                case 'drag':
                    comp_container.style.pointerEvents = "unset";
                    break;
                case 'brush':
                    points.push({ x: mouseC.x, y: mouseC.y });
                    ctx.strokeStyle = brushColor.value;
                    ctx.fillStyle = brushColor.value;
                    ctx.lineWidth = brushSize.value;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    if (chk_mask.checked) {
                        ctx.strokeStyle = "white";
                        ctx.fillStyle = "white";
                    }
                    break;
                case 'line':
                    startPoint = { x: mouseC.x, y: mouseC.y };
                    ctx.strokeStyle = brushColor.value;
                    ctx.fillStyle = brushColor.value;
                    ctx.lineWidth = brushSize.value;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    if (chk_mask.checked) {
                        ctx.strokeStyle = "white";
                        ctx.fillStyle = "white";
                    }
                    break;
                case 'eraser':
                    points.push({ x: mouseC.x, y: mouseC.y });
                    ctx.strokeStyle = "black";
                    ctx.fillStyle = "black";
                    ctx.lineWidth = brushSize.value;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    if (chk_mask.checked) {
                        ctx.strokeStyle = "white";
                        ctx.fillStyle = "white";
                    }
                    break;
            }
        }

        this.onToolMove = function() {
            if (comparison.isCompareDown || comparison.isOpacityDown) return;
            if (mouse.isDown && mouse.btn == 3) {
                this.pan();
                return;
            }

            switch (this.name) {
                case 'drag':
                    break;
                case 'brush':
                    helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                    if (mouse.isDown) {
                        points.push({ x: mouseC.x, y: mouseC.y });
                        this.brush();
                    }
                    break;
                case 'line':
                    helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                    if (mouse.isDown)
                        helper.line(startPoint, mouseC, brushSize.value / 2);
                    break;
                case 'eraser':
                    helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                    if (mouse.isDown) {
                        points.push({ x: mouseC.x, y: mouseC.y });
                        this.eraser();
                    }
                    break;
            }
        }

        this.onToolUp = function() {
            switch (this.name) {
                case 'drag':
                    break;
                case 'brush':
                    workspace.savePaintCanvas();
                    memory.record();
                    if (chk_mask.checked) createMask();
                    break;
                case 'line':
                    endPoint = { x: mouseC.x, y: mouseC.y };
                    this.line();
                    workspace.savePaintCanvas();
                    memory.record();
                    if (chk_mask.checked) createMask();
                    break;
                case 'eraser':
                    workspace.savePaintCanvas();
                    memory.record();
                    if (chk_mask.checked) createMask();
                    break;
            }

            points = [];
            helper.clear();
            document.body.style.cursor = "default";
            comp_container.style.border = 'none';
            comp_container.style.pointerEvents = "unset";
        }

        this.onToolOut = function() {
            points = [];
            helper.clear();
            document.body.style.cursor = "default";
            comp_container.style.border = 'none';
            comp_container.style.pointerEvents = "unset";
        }

        this.toolSelector = function(name) {
            this.name = name;

            const elem = document.getElementsByClassName('tool_' + this.name);
            for (const i of document.querySelectorAll('li'))
                if (i.classList.contains("tool_selector"))
                    i.classList.remove("tool_selector");
            for (const i of document.querySelectorAll('button'))
                if (i.classList.contains("tool_selector"))
                    i.classList.remove("tool_selector");
            for (let i = 0; i < elem.length; i++)
                elem[i].classList.add("tool_selector");

            helper.clear();

            switch (this.name) {
                case 'drag':
                    container_top.style.cursor = "default";
                    break;
                case 'brush':
                    container_top.style.cursor = "crosshair";
                    break;
                case 'line':
                    container_top.style.cursor = "crosshair";
                    break;
                case 'eraser':
                    container_top.style.cursor = "crosshair";
                    break;
            }
        }

        this.init();
    }


    // -------------------------------------------------------
    // Memory


    function Memory() {
        this.stack = [];
        this.block = -1;

        this.record = function() {
            this.stack[++this.block] = ctx.getImageData(0, 0, width.value, height.value);
            this.stack.splice(this.block + 1);
        }

        this.undo = function() {
            --this.block;
            if (this.stack[this.block]) {
                ctx.clearRect(0, 0, width.value, height.value);
                ctx.putImageData(this.stack[this.block], 0, 0);
                workspace.savePaintCanvas();
                if (chk_mask.checked) createMask();
            } else {
                ++this.block;
            }
        }

        this.redo = function() {
            ++this.block;
            if (this.stack[this.block]) {
                ctx.clearRect(0, 0, width.value, height.value);
                ctx.putImageData(this.stack[this.block], 0, 0);
                workspace.savePaintCanvas();
                if (chk_mask.checked) createMask();
            } else {
                --this.block;
            }
        }

        this.clear = function() {
            this.stack = [];
            this.block = -1;
            this.record();
        }
    }

    function Styles() {
        const activeNum = document.getElementById("styles_active_num");
        const searchNum = document.getElementById("styles_search_num");
        this.search = document.getElementById("styles_search");
        this.active = [];

        this.init = function() {
            this.createStyles();

            this.search.addEventListener("input", (ev) => {
                const items = document.querySelectorAll('#styles button');
                if (this.search.value.length > 1) {
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].innerHTML.toLowerCase().includes(this.search.value)) {
                            items[i].classList.add("style_flag_searched");
                        } else {
                            if (items[i].classList.contains("style_flag_searched"))
                                items[i].classList.remove("style_flag_searched")
                        }
                    }
                } else {
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].classList.contains("style_flag_searched"))
                            items[i].classList.remove("style_flag_searched")
                    }
                }

                searchNum.innerHTML = `${ document.querySelectorAll('.style_flag_searched').length } / ${ STYLES.length }`;
            }, false);

            searchNum.innerHTML = "0 / " + STYLES.length;
        }

        this.createStyles = function() {
            for (let i = 0; i < STYLES.length; i++) {
                if (STYLES[i] == "") {
                    const btn = document.createElement("button");
                    btn.classList.add("style_cat");
                    document.getElementById("styles").appendChild(btn);
                } else {
                    const btn = document.createElement("button");
                    btn.innerHTML = STYLES[i].charAt(0).toUpperCase() + STYLES[i].slice(1);
                    btn.onclick = (ev) => {
                        if (btn.classList.contains("style_flag_selected")) {
                            btn.classList.remove("style_flag_selected")
                            const index = this.active.indexOf(btn.innerHTML);
                            if (index > -1)
                                this.active.splice(index, 1);
                        } else {
                            btn.classList.add("style_flag_selected");
                            this.active.push(btn.innerHTML);
                        }
                        activeNum.innerHTML = this.active.length;
                    };
                    document.getElementById("styles").appendChild(btn);
                }
            }
        }

        this.clearStyles = async function() {
            if (!await showConfirm("Clear all styles?")) return;
            const items = document.querySelectorAll('#styles button');
            for (let i = 0; i < items.length; i++) {
                if (items[i].classList.contains("style_flag_selected"))
                    items[i].classList.remove("style_flag_selected")
            }
            this.active = [];
            activeNum.innerHTML = 0;
        }

        this.clearSearch = function() {
            const items = document.querySelectorAll('#styles button');
            for (let i = 0; i < items.length; i++) {
                if (items[i].classList.contains("style_flag_searched"))
                    items[i].classList.remove("style_flag_searched")
            }
            this.search.value = "";
            searchNum.innerHTML = "0 / " + STYLES.length;
        }

        this.init();
    }

        tool.onToolDown();
        if (mouse.btn == 2)
            workspace.zoomReset();
    }, false);

    container_top.addEventListener('pointermove', (ev) => {
        workPos = comp_container.getBoundingClientRect();
        mouse.x = ev.clientX;
        mouse.y = ev.clientY;
        mouseC.x = (ev.clientX - workPos.left) / workspace.zoomAmount;
        mouseC.y = (ev.clientY - workPos.top) / workspace.zoomAmount;
        tool.onToolMove();
        mouse.lastX = mouse.x;
        mouse.lastY = mouse.y;
        mouseC.lastX = mouseC.x;
        mouseC.lastY = mouseC.y;
    }, false);

    container_top.addEventListener('pointerup', (ev) => {
        mouse.isDown = false;
        mouse.lastX = 0;
        mouse.lastY = 0;
        mouseC.lastX = mouseC.x;
        mouseC.lastY = mouseC.y;
        tool.onToolUp();
    }, false);

    container_top.addEventListener('pointerleave', (ev) => {
        mouse.isDown = false;
        mouse.lastX = 0;
        mouse.lastY = 0;
        mouseC.lastX = mouseC.x;
        mouseC.lastY = mouseC.y;
        tool.onToolOut();
    }, false);

    container_top.addEventListener('wheel', (ev) => {
        workspace.zoom(ev.deltaY);
    }, false);

    container_top.addEventListener('contextmenu', (ev) => {
        ev.preventDefault();
    }, false);

    document.addEventListener("keydown", (ev) => {
        if (ev.ctrlKey && ev.key === 'Enter')
            if (server.isConnect) server.generate();
        if (ev.ctrlKey && ev.key === 'l')
            document.getElementById('openmeta').click();
        
        if (ev.target.matches(".ignorekeys")) return;

        switch (ev.key) {
            case ' ':
                pool.toggle();
                break;
            case 'd':
                tool.toolSelector("drag");
                break;
            case 'b':
                tool.toolSelector("brush");
                break;
            case 'l':
                tool.toolSelector("line");
                break;
            case 'e':
                tool.toolSelector("eraser");
                break;
            case 'm':
                chk_mask.checked = !chk_mask.checked;
                if (chk_mask.checked) chk_maskImage.checked = true;
                break;
            case ']':
                brushSize.value = parseInt(brushSize.value) + 1;
                if (brushSize.value >= 100) brushSize.value = 100;
                brushSize.previousElementSibling.innerHTML = brushSize.value;
                helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                break;
            case '[':
                brushSize.value = parseInt(brushSize.value) - 1;
                if (brushSize.value <= 1) brushSize.value = 1;
                brushSize.previousElementSibling.innerHTML = brushSize.value;
                helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                break;
            case '=': //+
                brushOpacity.value = parseFloat(brushOpacity.value) + 0.01;
                if (brushOpacity.value >= 1) brushOpacity.value = 1;
                brushOpacity.previousElementSibling.innerHTML = brushOpacity.value;
                helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                break;
            case '-':
                brushOpacity.value = parseFloat(brushOpacity.value) - 0.01;
                if (brushOpacity.value <= 0.01) brushOpacity.value = 0.01;
                brushOpacity.previousElementSibling.innerHTML = brushOpacity.value;
                helper.circleStroke(mouseC.x, mouseC.y, brushSize.value / 2);
                break;
        }
        if (ev.ctrlKey && ev.key === 'z') memory.undo();
        if (ev.ctrlKey && ev.key === 'x') memory.redo();
    }, false);


    // -------------------------------------------------------
    // Comparison Interface


    function Comparison(initial = 0.5) {
        const canvas = document.getElementsByClassName("img_comp_overlay")[0];
        const slider_compare = document.createElement("div");
        const slider_opacity = document.createElement("div");
        let pos_c = 0;
        let pos_o = 0;
        this.isCompareDown = false;
        this.isOpacityDown = false;

        this.init = function() {
            canvas.style.width = (width.value / initial) + "px";
            
            slider_compare.setAttribute("class", "comp_slider");
            slider_opacity.setAttribute("class", "comp_slider2");
            canvas.parentElement.insertBefore(slider_compare, canvas);
            canvas.parentElement.insertBefore(slider_opacity, canvas);

            this.updateCompSliderCompare(width.value / initial);
            this.updateCompSliderOpacity(width.value);
            slider_compare.style.top = 0;
            slider_opacity.style.bottom = "-10px";
            
            slider_compare.addEventListener("mousedown", slideReady_compare, false);
            slider_compare.addEventListener("touchstart", slideReady_compare, false);
            slider_opacity.addEventListener("mousedown", slideReady_opacity, false);
            slider_opacity.addEventListener("touchstart", slideReady_opacity, false);
            window.addEventListener("mouseup", slideFinish, false);
            window.addEventListener("touchend", slideFinish, false);
        }

        this.updateCompSliderCompare = function(size) {
            slider_compare.style.left = (size + 3) - (slider_compare.offsetWidth / 2) + "px";
            slider_compare.style.height = height.value + "px";
            canvas.style.width = size + "px";
        }

        this.updateCompSliderOpacity = function(size) {
            slider_opacity.style.left = (size) - (slider_opacity.offsetWidth) + "px";
        }

        this.toggleSliders = function(isEnabled) {
            (isEnabled) ? slider_compare.style.display = "unset" : slider_compare.style.display = "none";
            (isEnabled) ? slider_opacity.style.display = "unset" : slider_opacity.style.display = "none";
        }
        
        function slideReady_compare(ev) {
            ev.preventDefault();
            comparison.isCompareDown = true;
            window.addEventListener("mousemove", slideMove_compare, false);
            window.addEventListener("touchmove", slideMove_compare, false);
        }
        function slideReady_opacity(ev) {
            ev.preventDefault();
            comparison.isOpacityDown = true;
            window.addEventListener("mousemove", slideMove_opacity, false);
            window.addEventListener("touchmove", slideMove_opacity, false);
        }
        function slideFinish() {
            comparison.isCompareDown = false;
            comparison.isOpacityDown = false;
            window.removeEventListener("mousemove", slideMove_compare, false);
            window.removeEventListener("touchmove", slideMove_compare, false);
            window.removeEventListener("mousemove", slideMove_opacity, false);
            window.removeEventListener("touchmove", slideMove_opacity, false);
        }
        function slideMove_compare(ev) {
            if (!comparison.isCompareDown) return false;
            pos_c = mouseC.x;
            if (pos_c < 0) pos_c = 0;
            if (pos_c > width.value) pos_c = width.value;
            slide_compare(pos_c);
        }
        function slideMove_opacity(ev) {
            if (!comparison.isOpacityDown) return false;
            pos_o = mouseC.x;
            if (pos_o < 0) pos_o = 0;
            if (pos_o > width.value - 40) pos_o = width.value - 40;
            slide_opacity(pos_o);
        }
        function slide_compare(w) {
            canvas.style.width = w + "px";
            slider_compare.style.left = (canvas.offsetWidth + 2) - (slider_compare.offsetWidth / 2) + "px";
        }
        function slide_opacity(w) {
            slider_opacity.style.left = (w + 40) - (slider_opacity.offsetWidth) + "px";
            canvas_paint.style.opacity = ((w + 40) / width.value).toFixed(2);
            canvas_image.style.opacity = canvas_paint.style.opacity;
        }

        this.init();
    }


    // -------------------------------------------------------
    // Resizable Interface


    document.querySelectorAll('.resizer').forEach((elem) => {
        resizable(elem);
    }, false);

    function resizable(resizer) {
        const direction = resizer.getAttribute('data-direction') || 'horizontal';
        const prevSibling = resizer.previousElementSibling;
        const nextSibling = resizer.nextElementSibling;
        let x = 0;
        let y = 0;
        let prevSiblingHeight = 0;
        let prevSiblingWidth = 0;

        const mouseDownHandler = (ev) => {
            x = (ev.touches) ? ev.touches[0].clientX : ev.clientX;
            y = (ev.touches) ? ev.touches[0].clientY : ev.clientY;
            const rect = prevSibling.getBoundingClientRect();
            prevSiblingHeight = rect.height;
            prevSiblingWidth = rect.width;
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            document.addEventListener('touchmove', mouseMoveHandler);
            document.addEventListener('touchend', mouseUpHandler);
        };

        const mouseMoveHandler = (ev) => {
            const dx = (ev.touches) ? ev.touches[0].clientX - x : ev.clientX - x;
            const dy = (ev.touches) ? ev.touches[0].clientY - y : ev.clientY - y;

            switch (direction) {
                case 'vertical':
                    const h = ((prevSiblingHeight + dy) * 100) / resizer.parentNode.getBoundingClientRect().height;
                    prevSibling.style.height = `${h}%`;
                    break;
                case 'horizontal':
                    const w = ((prevSiblingWidth + dx) * 100) / resizer.parentNode.getBoundingClientRect().width;
                    prevSibling.style.width = `${w}%`;
                    break;
            }

            const cursor = direction === 'horizontal' ? 'col-resize' : 'row-resize';
            resizer.style.cursor = cursor;
            document.body.style.cursor = cursor;
            prevSibling.style.userSelect = 'none';
            prevSibling.style.pointerEvents = 'none';
            nextSibling.style.userSelect = 'none';
            nextSibling.style.pointerEvents = 'none';
        };

        const mouseUpHandler = () => {
            resizer.style.removeProperty('cursor');
            document.body.style.removeProperty('cursor');
            prevSibling.style.removeProperty('user-select');
            prevSibling.style.removeProperty('pointer-events');
            nextSibling.style.removeProperty('user-select');
            nextSibling.style.removeProperty('pointer-events');
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
            document.removeEventListener('touchmove', mouseMoveHandler);
            document.removeEventListener('touchend', mouseUpHandler);
        };

        resizer.addEventListener('mousedown', mouseDownHandler);
        resizer.addEventListener('touchstart', mouseDownHandler);
    }


    // -------------------------------------------------------
    // Hover Interface


    const hoverOffsets = [
        { x: 0, y: 0 }, { x: 0, y: 0 }
    ];

    let lastIndex = 1000;

    function hoverElement(elem, target, hIndex) {
        let active = false;
        let currentX, currentY, initialX, initialY;
        
        // prevent fast-dragging problem with background elements
        document.body.addEventListener("mousedown", dragStart, false);
        document.body.addEventListener("mouseup", dragEnd, false);
        document.body.addEventListener("mousemove", drag, false);
        document.body.addEventListener("touchstart", dragStart, false);
        document.body.addEventListener("touchend", dragEnd, false);
        document.body.addEventListener("touchmove", drag, false);

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - hoverOffsets[hIndex].x;
                initialY = e.touches[0].clientY - hoverOffsets[hIndex].y;
            } else {
                initialX = e.clientX - hoverOffsets[hIndex].x;
                initialY = e.clientY - hoverOffsets[hIndex].y;
            }
            if (e.target === elem) active = true;
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            active = false;
            document.body.removeEventListener("mousedown", dragStart, false);
            document.body.removeEventListener("mouseup", dragEnd, false);
            document.body.removeEventListener("mousemove", drag, false);
            document.body.removeEventListener("touchstart", dragStart, false);
            document.body.removeEventListener("touchend", dragEnd, false);
            document.body.removeEventListener("touchmove", drag, false);
        }

        function drag(e) {
            if (active) {
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                hoverOffsets[hIndex].x = currentX;
                hoverOffsets[hIndex].y = currentY;
                setTranslate(currentX, currentY, target);
            }
        }
        
        function setTranslate(xPos, yPos, el) {
            el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
        }
    }

    canvasEditor.addEventListener("pointerdown", (ev) => {
        canvasEditor.style.zIndex = lastIndex + 1;
        lastIndex += 1;
    }, false);

    stylesEditor.addEventListener("pointerdown", (ev) => {
        stylesEditor.style.zIndex = lastIndex + 1;
        lastIndex += 1;
    }, false);
    

    // -------------------------------------------------------
    // Utils
    

    function initPrompts() {
        prompt.addEventListener("input", (ev) => {
            localStorage.setItem("prompt", prompt.value);
        }, false);

        negative.addEventListener("input", (ev) => {
            localStorage.setItem("negative", negative.value);
        }, false);

        let data = localStorage.getItem("prompt");
        if (data)
            prompt.value = data;
        
        data = localStorage.getItem("negative");
        if (data)
            negative.value = data;
        data = null;
    }
    
    function createTempCanvas(callback) {
        canvas_tmp.width = width.value;
        canvas_tmp.height = height.value;
        callback(canvas_tmp.getContext('2d'));
        return canvas_tmp.toDataURL("image/png");
    }

    function createMask() {
        img_mask.src = createTempCanvas((c) => {
            c.fillStyle = "black";
            c.fillRect(0, 0, width.value, height.value);
            c.globalCompositeOperation = 'luminosity';
            c.drawImage(canvas_paint, 0, 0);
            c.globalCompositeOperation = 'source-over';

    function createCheckpoints(arr) {
        checkpoint.innerHTML = "";
        for (const i in arr)
            checkpoint.innerHTML += `<option value="${ arr[i] }">${ arr[i] }</option>`;
    }

    function toggleMenu(elem, closedHeight = 0, scroll = window.innerHeight) {
        (elem.nextElementSibling.style.height == `${ closedHeight }px`) ?
            elem.nextElementSibling.style.height = "fit-content" :

    function toggleCanvasEditor() {
        canvasEditor.style.zIndex = lastIndex + 1;
        lastIndex += 1;

        (canvasEditor.style.display == "unset") ?
            canvasEditor.style.display = "none" :
            canvasEditor.style.display = "unset";
    }

    function toggleStylesEditor() {
        stylesEditor.style.zIndex = lastIndex + 1;
        lastIndex += 1;

        (stylesEditor.style.display == "unset") ?
            stylesEditor.style.display = "none" :

        styles.search.focus();

    async function clearImageInit() {
        if (img_init.src == IMG_NULL) return;
        if (!await showConfirm("Clear input image?")) return;
        img_init.src = IMG_NULL;
        chk_initImage.checked = false;
    }

    async function clearImageMask() {
        if (img_mask.src == IMG_NULL) return;
        if (!await showConfirm("Clear mask image?")) return;
        img_mask.src = IMG_NULL;
        chk_maskImage.checked = false;
    }

    const domConfirm = document.getElementById('confirm');
    const domConfirmBlocker = document.getElementById('confirmblocker');
    async function showConfirm(title) {
        domConfirmBlocker.style.display = 'unset';
        domConfirm.style.display = 'unset';
        domConfirm.children[0].innerHTML = title;
        return new Promise((resolve) => {
            domConfirm.children[1].onclick = (ev) => {
                domConfirmBlocker.style.display = 'none';
                domConfirm.style.display = 'none';
                resolve(false);
            };
            domConfirm.children[2].onclick = (ev) => {
                domConfirmBlocker.style.display = 'none';
                domConfirm.style.display = 'none';
                resolve(true);
            };
            domConfirmBlocker.onclick = (ev) => {
                domConfirmBlocker.style.display = 'none';
                domConfirm.style.display = 'none';
                resolve(false);
            };
        });
    }

    function notifier(str, timeout = 5000) {
        if (notification.style.display == 'unset')
            clearTimeout(notificationTimer);
        notification.innerHTML = str.toUpperCase();
        notification.style.display = 'unset';
        notificationTimer = setTimeout(() => {
            notification.style.display = 'none';
        }, timeout);
    }

    function downloadImage(img, filename) {
        if (img.src == IMG_NULL) return;
        const link = document.createElement("a");
        link.download = filename;
        link.href = img.src;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function downloadCanvas() {
        const link = document.createElement("a");
        link.download = "md_canvas_no_metadata.png";
        link.href = workspace.bakeWorkspace();
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function drawPoints(ctx, points, size) {
        if (points.length < 6) {
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, size / 2, 0, PI2, false);
            ctx.closePath();
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            let i = 0;
            for (i = 1; i < points.length - 2; i++) {
                ctx.quadraticCurveTo(
                    points[i].x, points[i].y, 
                    (points[i].x + points[i + 1].x) / 2,
                    (points[i].y + points[i + 1].y) / 2);
            }
            ctx.quadraticCurveTo(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y);
            ctx.stroke();
        }
    }

    function plotLine(tolerance, Ax,Ay, Bx,By) {
        const dx = Bx - Ax;
        const dy = By - Ay;
        const ptCount = parseInt(Math.sqrt(dx*dx + dy*dy)) * 3;
        let lastX = -10000;
        let lastY = -10000;
        let pts = [{ x: Ax, y: Ay }];
        let t, x, y, dx1, dy1;
        for (let i = 1; i <= ptCount; i++) {
            t = i / ptCount;
            x = Ax + dx * t;
            y = Ay + dy * t;
            dx1 = x - lastX;
            dy1 = y - lastY;
            if (dx1*dx1 + dy1*dy1 > tolerance) {
                pts.push({ x: x, y: y });
                lastX = x;
                lastY = y;
            }
        }
        pts.push({ x: Bx, y: By });
        return pts;
    }

    function copyTextData(str, elem) {
        const input = document.createElement('input');
        input.type = 'text';
        input.value = str;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        elem.innerHTML = 'Copied';
        setTimeout(() => {
            elem.innerHTML = 'Copy';
        }, 1000);
    }

    function selectOptionByValue(elem, val) {
        for (let i = 0; i < elem.options.length; i++) {
            if (elem.options[i].text== val) {
                elem.options[i].selected = true;
                return;
            }
        }
    }

    function randomRangeInt(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
